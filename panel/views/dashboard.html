{% extends "base.html" %}
{% block content %}
<h1>IT Admin Dashboard</h1>
<div class="stat-grid">
  <div class="stat-card"><div class="number">{{ stats.total_users }}</div><div class="label">Total Users</div></div>

<p><a class="btn" href="/users">View All Users →</a></p>
{% endblock %}

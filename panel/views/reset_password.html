{% extends "base.html" %}
{% block content %}
<h1>Reset Password</h1>
<div class="form-box">
  <form method="POST" action="/users/reset-password">
    <label>User Email Address</label>
    <input id="email" type="email" name="email" placeholder="user@company.com" required>
    <button type="submit">Reset Password</button>
  </form>
</div>
{% endblock %}
